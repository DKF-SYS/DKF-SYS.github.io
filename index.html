<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKF INDUSTRIES // LIVE VAULT MATRIX</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #030712;
            --terminal-green: #10b981;
            --alert-red: #ef4444;
            --amber-warn: #f59e0b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;

            --glow-snpx: #10b981;
            --glow-chll: #10b981;
            --glow-glum: #a855f7;
            --glow-bite: #f97316;
            --glow-pdgy: #38bdf8;
            --glow-scrh: #ec4899;
            --glow-gwat: #10b981;
            --glow-zro:  #3b82f6;
            --glow-crkt: #eab308;
            --glow-slk:  #d946ef;
            --glow-ghst: #e2e8f0;
            --glow-lock: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 40%, rgba(16, 185, 129, 0.08), transparent 70%),
                linear-gradient(to bottom, rgba(3, 7, 18, 0.85), rgba(3, 7, 18, 0.98));
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* CRT Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .vault-header {
            background: rgba(11, 18, 27, 0.9);
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--terminal-green);
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .status-pill {
            background: #7f1d1d;
            color: #fca5a5;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--alert-red);
        }

        .status-pill.unlocked {
            background: rgba(16, 185, 129, 0.2);
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
            box-shadow: 0 0 8px var(--terminal-green);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            width: 160px;
            height: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #059669, #10b981);
            box-shadow: 0 0 8px #10b981;
            transition: width 0.4s ease;
        }

        .dev-bypass-btn {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid var(--amber-warn);
            color: var(--amber-warn);
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .dev-bypass-btn:hover { background: var(--amber-warn); color: #000; }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-item {
            background-color: #0b0f19;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card-item:hover { transform: translateY(-6px); }

        .card-snpx { border: 2px solid var(--glow-snpx); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .card-chll { border: 2px solid var(--glow-chll); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .card-glum { border: 2px solid var(--glow-glum); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        .card-bite { border: 2px solid var(--glow-bite); box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        .card-pdgy { border: 2px solid var(--glow-pdgy); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .card-scrh { border: 2px solid var(--glow-scrh); box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); }
        .card-gwat { border: 2px solid var(--glow-gwat); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .card-zro  { border: 2px solid var(--glow-zro);  box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .card-crkt { border: 2px solid var(--glow-crkt); box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
        .card-slk  { border: 2px solid var(--glow-slk);  box-shadow: 0 0 15px rgba(217, 70, 239, 0.4); }
        .card-ghst { border: 2px solid var(--glow-ghst); box-shadow: 0 0 15px rgba(226, 232, 240, 0.4); }
        .card-lock { border: 2px solid var(--glow-lock); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); background: #180909; }

        .card-inner {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .card-number-badge {
            position: absolute;
            top: 12px; left: 12px;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #fff;
            z-index: 5;
        }

        .image-frame {
            width: 100%;
            height: 210px;
            background-color: #030712;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-frame img { width: 100%; height: 100%; object-fit: contain; }

        .card-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            margin-bottom: 6px;
        }

        .status-badge-front {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 6px;
        }

        .badge-locked-front { background: rgba(239, 68, 68, 0.15); color: var(--alert-red); border: 1px solid var(--alert-red); }
        .badge-cleared-front { background: rgba(16, 185, 129, 0.15); color: var(--terminal-green); border: 1px solid var(--terminal-green); }

        .card-progress-bar-bg { width: 100%; height: 6px; background: #000; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
        .card-progress-bar-fill { height: 100%; transition: width 0.3s ease; }

        .addr-box {
            background: rgba(3, 7, 18, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-align: center;
        }

        .ticker-pill {
            align-self: center;
            background: #000;
            padding: 3px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: auto;
        }

        .mini-chart-box { height: 32px; width: 100%; margin-bottom: 4px; }

        /* Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #0b111e;
            border: 2px solid var(--terminal-green);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            border-radius: 8px;
            max-width: 520px;
            width: 100%;
            padding: 24px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 12px; right: 16px;
            background: transparent;
            border: none;
            color: var(--alert-red);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .modal-btn {
            background: rgba(16, 185, 129, 0.15);
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
            padding: 10px 16px;
            border-radius: 4px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .modal-btn:hover { background: var(--terminal-green); color: #000; }

        .game-board {
            background: #030712;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
        }

        /* SAFE DIAL */
        .safe-container {
            position: relative; width: 200px; height: 200px; margin: 15px auto;
            display: flex; align-items: center; justify-content: center;
        }

        .safe-dial {
            width: 170px; height: 170px; border-radius: 50%;
            background: radial-gradient(circle, #334155 0%, #0f172a 70%, #020617 100%);
            border: 6px solid #475569;
            box-shadow: inset 0 0 15px #000;
            position: relative;
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .dial-marker {
            position: absolute; top: -12px; left: calc(50% - 2px);
            width: 4px; height: 14px; background: var(--alert-red);
            box-shadow: 0 0 8px var(--alert-red); z-index: 10;
        }

        .safe-number-display {
            font-size: 1.8rem; font-weight: bold; color: var(--terminal-green);
            letter-spacing: 4px; margin-top: 8px; text-shadow: 0 0 10px var(--terminal-green);
        }

        /* BOUNCING ANDY PHYSICS */
        #andy-flying-icon {
            position: fixed; top: 0; left: 0;
            width: 160px; height: 160px; z-index: 5000; pointer-events: none;
            display: none; filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.8));
        }

        .andy-trail {
            position: fixed; width: 160px; height: 160px; pointer-events: none;
            z-index: 4999; opacity: 0.6; filter: blur(4px) hue-rotate(90deg);
            transition: opacity 0.4s ease-out;
        }

        /* Interactive Custom UI Elements */
        .grid-2x2 { display: grid; grid-template-columns: repeat(2, 60px); gap: 10px; justify-content: center; margin: 12px 0; }
        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 50px); gap: 8px; justify-content: center; margin: 12px 0; }
        .grid-5x5 { display: grid; grid-template-columns: repeat(5, 32px); gap: 4px; justify-content: center; margin: 12px 0; }

        .mem-tile { width: 60px; height: 60px; background: #1e293b; border: 1px solid #475569; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; }
        .mem-tile.flash { background: var(--terminal-green) !important; box-shadow: 0 0 15px var(--terminal-green); }

        .node-tile { width: 50px; height: 50px; background: #1e293b; border: 2px solid #475569; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; transition: all 0.2s; }
        .node-tile.active { background: rgba(16, 185, 129, 0.3); border-color: var(--terminal-green); box-shadow: 0 0 10px var(--terminal-green); color: var(--terminal-green); }

        .bit-tile { width: 32px; height: 32px; background: #1e293b; border: 1px solid #475569; border-radius: 4px; cursor: pointer; font-size: 0.75rem; color: #fff; display: flex; align-items: center; justify-content: center; }
        .bit-tile.active { background: var(--terminal-green); color: #000; font-weight: bold; }

        .patch-jack { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #64748b; background: #0f172a; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #fff; }
        .patch-jack.selected { border-color: var(--amber-warn); box-shadow: 0 0 12px var(--amber-warn); }
        .patch-jack.wired { border-color: var(--terminal-green); background: rgba(16, 185, 129, 0.3); box-shadow: 0 0 12px var(--terminal-green); }

        @keyframes alarmFlash {
            0% { background-color: rgba(239, 68, 68, 0.35); }
            50% { background-color: rgba(0, 0, 0, 0.95); }
            100% { background-color: rgba(239, 68, 68, 0.35); }
        }
        .alarm-active { animation: alarmFlash 0.4s infinite !important; }
    </style>
</head>
<body>

    <img src="lock.png" id="andy-flying-icon" alt="Andy Unleashed" onerror="this.onerror=null; this.src='lock.jpg';">

    <div class="vault-header">
        <div class="header-title">
            <span>LIVE VAULT: SUB-WALLET #01</span>
            <span class="status-pill" id="global-status-pill">LOCKED</span>
        </div>
        <div class="progress-container">
            <span id="progress-text">Clearance: 0 / 11 (0%)</span>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="global-progress-fill"></div>
            </div>
            <button class="dev-bypass-btn" onclick="devUnlockAll()">[DEV: UNLOCK ALL]</button>
        </div>
        <div style="font-size: 0.9rem; font-weight: bold; color: #38bdf8;">TREASURY: 14.2 SOL</div>
    </div>

    <div class="card-grid" id="card-grid"></div>

    <div class="modal-overlay" id="card-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const cardsData = [
            { id: 1, name: "MR. SNAPS", ticker: "$SNPX", baseName: "snaps", class: "card-snpx", color: "#10b981", addr: "3kF9xA1...9b2Z", chart: [12, 18, 25, 22, 45], solved: false, type: "simon" },
            { id: 2, name: "CHILL-BOT 9000", ticker: "$MLOW", baseName: "mlow", class: "card-chll", color: "#10b981", addr: "7mP2qC8...4v1L", chart: [30, 35, 40, 52, 60], solved: false, type: "valves" },
            { id: 3, name: "GLOOMIE", ticker: "$GLUM", baseName: "glum", class: "card-glum", color: "#a855f7", addr: "9xT4vN1...1m8K", chart: [10, 15, 12, 28, 30], solved: false, type: "sine" },
            { id: 4, name: "OVER-BITE", ticker: "$BITE", baseName: "bite", class: "card-bite", color: "#f97316", addr: "2bL8rY9...6p3W", chart: [40, 50, 65, 70, 80], solved: false, type: "maze" },
            { id: 5, name: "PUDGY BYTES", ticker: "$PDGY", baseName: "pdgy", class: "card-pdgy", color: "#38bdf8", addr: "5vZ1mQ4...8t7X", chart: [5, 12, 10, 15, 20], solved: false, type: "nonogram" },
            { id: 6, name: "SCREECH", ticker: "$SCRH", baseName: "scrh", class: "card-scrh", color: "#ec4899", addr: "8kN3pL2...5x9Y", chart: [50, 60, 75, 82, 90], solved: false, type: "morse" },
            { id: 7, name: "GIGA-WATT", ticker: "$GWAT", baseName: "gwat", class: "card-gwat", color: "#10b981", addr: "1qW4eR7...3y2U", chart: [20, 30, 25, 40, 50], solved: false, type: "switches" },
            { id: 8, name: "ZERO", ticker: "$ZRO", baseName: "zro", class: "card-zro", color: "#3b82f6", addr: "4uI9oP1...7a6S", chart: [5, 8, 10, 12, 15], solved: false, type: "caesar" },
            { id: 9, name: "PROFESSOR CIRCUIT", ticker: "$CRKT", baseName: "crkt", class: "card-crkt", color: "#eab308", addr: "6dF3gH8...2j1K", chart: [30, 45, 50, 62, 70], solved: false, type: "gears" },
            { id: 10, name: "SLICK", ticker: "$SLK", baseName: "slk", class: "card-slk", color: "#d946ef", addr: "9zC5vB0...4m3N", chart: [15, 20, 32, 38, 40], solved: false, type: "rebus" },
            { id: 11, name: "THE DEVELOPER'S GHOST", ticker: "$GHST", baseName: "ghst", class: "card-ghst", color: "#e2e8f0", addr: "3xS7dF2...8g9H", chart: [2, 4, 6, 8, 10], solved: false, type: "patchbay" },
            { id: 12, name: "ANDY'S VAULT", ticker: "NODE-12", class: "card-lock", color: "#ef4444", addr: "ENCRYPTED", chart: [], solved: false, isVault: true }
        ];

        const gridContainer = document.getElementById("card-grid");
        const chartInstances = {};

        function handleImageError(imgElement, baseName) {
            if (imgElement.dataset.triedPng) { imgElement.style.display = 'none'; return; }
            imgElement.dataset.triedPng = "true";
            imgElement.src = baseName + ".png";
        }

        function devUnlockAll() {
            cardsData.forEach(c => { if(!c.isVault) c.solved = true; });
            renderGrid();
            alert("⚡ [DEV BYPASS ACTIVATED]: All 11 character nodes unlocked! Click Node 12 (Andy's Vault) to test the combination safe and bouncing fireworks finale.");
        }

        function updateGlobalBanner() {
            const solvedCount = cardsData.filter(c => !c.isVault && c.solved).length;
            const percentage = Math.round((solvedCount / 11) * 100);
            document.getElementById("progress-text").innerText = `Clearance: ${solvedCount} / 11 (${percentage}%)`;
            document.getElementById("global-progress-fill").style.width = `${percentage}%`;
            
            const pill = document.getElementById("global-status-pill");
            if (solvedCount === 11) { pill.innerText = "SAFE READY"; pill.classList.add("unlocked"); }
            else { pill.innerText = "LOCKED"; pill.classList.remove("unlocked"); }
        }

        function renderGrid() {
            gridContainer.innerHTML = "";
            let solvedCount = cardsData.filter(c => !c.isVault && c.solved).length;
            updateGlobalBanner();

            cardsData.forEach((card, index) => {
                const cardEl = document.createElement("div");

                if (card.isVault) {
                    cardEl.className = `card-item ${card.class}`;
                    const readyToActivate = solvedCount === 11;
                    cardEl.innerHTML = `
                        <div class="card-number-badge" style="color: var(--alert-red); border-color: var(--alert-red);">12</div>
                        <div class="card-inner">
                            <div class="image-frame" style="border-color: ${readyToActivate ? 'var(--terminal-green)' : 'var(--alert-red)'};">
                                <img src="lock.png" alt="Andy's Vault" onerror="this.onerror=null; this.src='lock.jpg';">
                            </div>
                            <div class="card-title" style="color: ${readyToActivate ? 'var(--terminal-green)' : 'var(--alert-red)'};">${card.name}</div>
                            <div class="status-badge-front ${readyToActivate ? 'badge-cleared-front' : 'badge-locked-front'}">
                                ${readyToActivate ? '🔓 SAFE UNLOCKED' : '🔒 ENCRYPTED'}
                            </div>
                            <div class="addr-box" style="border-color: var(--alert-red); color: var(--alert-red);">SAFE COMBINATION DIAL</div>
                            <div class="ticker-pill" style="color: ${readyToActivate ? 'var(--terminal-green)' : 'var(--alert-red)'}; border-color: ${readyToActivate ? 'var(--terminal-green)' : 'var(--alert-red)'};">[${readyToActivate ? 'UNLOCKED' : 'LOCKED'}]</div>
                        </div>
                    `;
                    cardEl.onclick = () => openSafeDialModal(readyToActivate);
                } else {
                    cardEl.className = `card-item ${card.class}`;
                    let statusBadgeHTML = card.solved
                        ? `<div class="status-badge-front badge-cleared-front">✓ UNLOCKED (100%)</div>`
                        : `<div class="status-badge-front badge-locked-front">🔒 LOCKED</div>`;

                    cardEl.innerHTML = `
                        <div class="card-number-badge">${card.id}</div>
                        <div class="card-inner">
                            <div class="image-frame">
                                <img src="${card.baseName}.jpg" alt="${card.name}" onerror="handleImageError(this, '${card.baseName}')">
                            </div>
                            <div class="card-title">${card.name}</div>
                            ${statusBadgeHTML}
                            <div class="card-progress-bar-bg">
                                <div class="card-progress-bar-fill" style="width: ${card.solved ? 100 : 0}%; background: ${card.color};"></div>
                            </div>
                            <div class="addr-box">CA: ${card.addr}</div>
                            <div class="mini-chart-box">
                                <canvas id="mini-chart-${card.id}"></canvas>
                            </div>
                            <div class="ticker-pill" style="color: ${card.color}; border-color: ${card.color};">${card.ticker}</div>
                        </div>
                    `;
                    cardEl.onclick = () => openModal(card, index);
                }

                gridContainer.appendChild(cardEl);
                if (!card.isVault) setTimeout(() => renderMiniChart(card), 50);
            });
        }

        function renderMiniChart(card) {
            const ctx = document.getElementById(`mini-chart-${card.id}`);
            if (!ctx) return;
            if (chartInstances[card.id]) chartInstances[card.id].destroy();

            chartInstances[card.id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1', '2', '3', '4', '5'],
                    datasets: [{ data: card.chart, borderColor: card.color, borderWidth: 1.5, pointRadius: 0, fill: false }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        function openModal(card, index) {
            const modal = document.getElementById("card-modal");
            const modalBody = document.getElementById("modal-body");
            
            if (card.solved) {
                modalBody.innerHTML = `

                modalBody.innerHTML = `
                    <div style="color: ${card.color}; font-size: 0.75rem;">// SECURE CHALLENGE INTERFACE (STAGE ${card.id})</div>

            modal.style.display = "flex";
            if(card.type === "nonogram" && !card.solved) initNonoGrid(index);
            if(card.type === "maze" && !card.solved) initMaze(index);
            if(card.type === "morse" && !card.solved) initMorseEvents(index);
            if(card.type === "switches" && !card.solved) initLights(index);
            if(card.type === "rebus" && !card.solved) initRebusBoard(index);
        }

        function closeModal() { document.getElementById("card-modal").style.display = "none"; }

        /* --- GAME ENGINE MECHANICS --- */

        /* CARD 1: MR. SNAPS SIMON ENGINE */
        let simonSeq = [0, 3, 1, 2];
        let userSimonStep = 0;
        function playSimonSeq(idx) {
            userSimonStep = 0;
            document.getElementById("simonStatus").innerText = "Memorize flashing order...";
            simonSeq.forEach((tileIdx, delay) => {
                setTimeout(() => {
                    const el = document.getElementById(`sm-${tileIdx}`);
                    if(el) {
                        el.classList.add("flash");
                        setTimeout(() => el.classList.remove("flash"), 300);
                    }
                }, (delay + 1) * 500);
            });
            setTimeout(() => {
                document.getElementById("simonStatus").innerText = "Your Turn! Tap tiles in sequence.";
            }, 2500);
        }
        function pressSimonTile(tileIdx, idx) {
            if(tileIdx === simonSeq[userSimonStep]) {
                userSimonStep++;
                if(userSimonStep === simonSeq.length) markSolved(idx, "Simon Memory Complete!");
            } else {
                document.getElementById("simonStatus").innerText = "❌ WRONG SEQUENCE! Restart.";
                userSimonStep = 0;
            }
        }

        /* CARD 2: CHILL-BOT 9000 DUAL DYNAMICS */
        let curPSI = 20; let curTemp = 10;
        function adjValves(pDelta, tDelta, idx) {
            curPSI = Math.max(0, curPSI + pDelta);
            curTemp = Math.max(0, curTemp + tDelta);
            document.getElementById("pVal").innerText = `PSI: ${curPSI}`;
            document.getElementById("tVal").innerText = `TEMP: ${curTemp}°C`;

            if(curPSI >= 40 && curPSI <= 60 && curTemp >= 30 && curTemp <= 50) {
                markSolved(idx, "Dual System Balanced!");
            }
        }

        /* CARD 3: GLOOMIE WAVE TUNER */
        function updateSineReadout() {
            document.getElementById("fVal").innerText = document.getElementById("freqSlider").value + " Hz";
            document.getElementById("aVal").innerText = document.getElementById("ampSlider").value + "%";
        }
        function checkSineSync(idx) {
            let f = document.getElementById("freqSlider").value;
            let a = document.getElementById("ampSlider").value;
            if(f >= 85 && f <= 90 && a >= 70 && a <= 80) markSolved(idx, "Wave Lock Achieved!");
            else alert("Alignment Off! Set Freq close to 88 Hz & Amp to 75%.");
        }

        /* CARD 4: OVER-BITE ARCADE MAZE */
        let playerPos = { r: 0, c: 0 };
        let hasPellet = false;
        function initMaze(idx) { playerPos = { r: 0, c: 0 }; hasPellet = false; renderMaze(idx); }
        function renderMaze(idx) {
            const container = document.getElementById("mazeContainer");
            if(!container) return;
            container.innerHTML = "";
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    const cell = document.createElement("div");
                    cell.style.width = "35px"; cell.style.height = "35px"; cell.style.border = "1px solid #334155";
                    cell.style.display = "flex"; cell.style.alignItems = "center"; cell.style.justifyContent = "center";
                    
                    if(r === playerPos.r && c === playerPos.c) { cell.innerText = "👾"; cell.style.background = "#f97316"; }
                    else if(r === 0 && c === 4 && !hasPellet) { cell.innerText = "🍖"; cell.style.background = "#eab308"; }
                    else if(r === 2 && c === 2) { cell.innerText = "💣"; cell.style.background = "#7f1d1d"; }
                    else if(r === 4 && c === 4) { cell.innerText = "🚩"; cell.style.background = hasPellet ? "#10b981" : "#334155"; }
                    else cell.style.background = "#0f172a";
                    container.appendChild(cell);
                }
            }
        }
        function moveMaze(dc, dr, idx) {
            let nr = playerPos.r + dr; let nc = playerPos.c + dc;
            if(nr >= 0 && nr < 5 && nc >= 0 && nc < 5) {
                if(nr === 2 && nc === 2) { alert("BOOM! Hit trap bomb!"); initMaze(idx); return; }
                playerPos = { r: nr, c: nc };
                if(nr === 0 && nc === 4) hasPellet = true;
                renderMaze(idx);
                if(nr === 4 && nc === 4) {
                    if(hasPellet) markSolved(idx, "Maze Escape Complete!");
                    else alert("DOOR LOCKED: Grab the 🍖 key pellet at top right first!");
                }
            }
        }

        /* CARD 5: PUDGY BYTES NONOGRAM */
        let nonoState = Array(25).fill(false);
        function initNonoGrid(idx) {
            const container = document.getElementById("nonoGrid");
            if(!container) return;
            container.innerHTML = "";
            nonoState.forEach((st, i) => {
                const btn = document.createElement("div");
                btn.className = `bit-tile ${st ? 'active' : ''}`;
                btn.innerText = st ? "1" : "0";
                btn.onclick = () => { nonoState[i] = !nonoState[i]; initNonoGrid(idx); };
                container.appendChild(btn);
            });
        }
        function verifyNonoGrid(idx) {
            // Target Pattern: Cross shape (+)
            const target = [2, 7, 10, 11, 12, 13, 14, 17, 22];
            let isValid = true;
            for(let i=0; i<25; i++) {
                let shouldBeOn = target.includes(i);
                if(nonoState[i] !== shouldBeOn) { isValid = false; break; }
            }
            if(isValid) markSolved(idx, "Nonogram Matrix Solved!");
            else alert("Pattern Incorrect! Turn ON the center cross shape (+)!");
        }

        /* CARD 6: SCREECH MORSE */
        let pressStart = 0; let morseStr = "";
        function initMorseEvents(idx) {
            const btn = document.getElementById("morseKey");
            if(!btn) return;
            btn.onmousedown = () => { pressStart = Date.now(); btn.style.background = "var(--terminal-green)"; };
            btn.onmouseup = () => {
                let duration = Date.now() - pressStart;
                btn.style.background = "#334155";
                morseStr += (duration > 200) ? "-" : ".";
                document.getElementById("morseLog").innerText = morseStr;
                if(morseStr === ".-.") markSolved(idx, "Telegraph Signal Decoded!");
                else if(morseStr.length >= 3) morseStr = "";
            };
        }

        /* CARD 7: GIGA-WATT LIGHTS OUT */
        let gridState = [false, true, false, false, false, false, false, true, false];
        function initLights(idx) {
            const container = document.getElementById("lightGrid");
            if(!container) return;
            container.innerHTML = "";
            gridState.forEach((st, i) => {
                const btn = document.createElement("div");
                btn.className = `node-tile ${st ? 'active' : ''}`;
                btn.innerText = st ? "ON" : "OFF";
                btn.onclick = () => toggleLightNode(i, idx);
                container.appendChild(btn);
            });
        }
        function toggleLightNode(i, idx) {
            const toggle = (n) => { if(n>=0 && n<9) gridState[n] = !gridState[n]; };
            toggle(i);
            if(i%3 !== 0) toggle(i-1);
            if(i%3 !== 2) toggle(i+1);
            toggle(i-3); toggle(i+3);
            initLights(idx);
            if(gridState.every(x => x)) markSolved(idx, "Power Grid Fully Routed!");
        }

        /* CARD 8: ZERO CIPHER */
        let cRing = 0; let cPol = false;
        function shiftCipherRing(idx) { cRing = (cRing + 1) % 10; updateCipherUI(idx); }
        function togglePolarity(idx) { cPol = !cPol; document.getElementById("polBtn").innerText = `POLARITY: (${cPol ? '+' : '-'})`; updateCipherUI(idx); }
        function updateCipherUI(idx) {
            document.getElementById("cVal").innerText = `Offset: ${cRing} | Polarity: ${cPol ? '+' : '-'}`;
            if(cRing === 7 && cPol) markSolved(idx, "Cipher Fully Decrypted!");
        }

        /* CARD 9: PROFESSOR CIRCUIT GEARS */
        let gVals = [1, 1, 1];
        function tuneGear(gNum, idx) {
            gVals[gNum-1] = (gVals[gNum-1] % 4) + 1;
            document.getElementById(`g${gNum}`).innerText = gVals[gNum-1];
            if(gVals[0] === 1 && gVals[1] === 2 && gVals[2] === 4) markSolved(idx, "Gear Pitch Synthesized!");
        }

        /* CARD 10: SLICK REBUS SWAP */
        let rebusIcons = ["⚡", "👁️", "🔑", "🐝"];
        let selectedTile = null;
        function initRebusBoard(idx) {
            const container = document.getElementById("rebusBoard");
            if(!container) return;
            container.innerHTML = "";
            rebusIcons.forEach((icon, i) => {
                const btn = document.createElement("button");
                btn.className = "mem-tile"; btn.style.fontSize = "1.3rem";
                btn.innerText = icon;
                btn.onclick = () => swapRebusTile(i, idx);
                container.appendChild(btn);
            });
        }
        function swapRebusTile(i, idx) {
            if(selectedTile === null) { selectedTile = i; }
            else {
                let temp = rebusIcons[selectedTile];
                rebusIcons[selectedTile] = rebusIcons[i];
                rebusIcons[i] = temp;
                selectedTile = null;
                initRebusBoard(idx);
                if(rebusIcons[0]==="👁️" && rebusIcons[1]==="🔑" && rebusIcons[2]==="⚡" && rebusIcons[3]==="🐝") {
                    markSolved(idx, "Neon Icon Circuit Aligned!");
                }
            }
        }

        /* CARD 11: DEVELOPER'S GHOST PATCHBAY */
        let activeJack = null;
        function selectJack(id, idx) {
            if(id === 's1') {
                activeJack = 's1';
                document.getElementById('jack-s1').classList.add('selected');
                document.getElementById('patchLog').innerText = "Source OSC1 selected. Select Target VCF!";
            } else if(id === 't1' && activeJack === 's1') {
                document.getElementById('jack-t1').classList.add('wired');
                document.getElementById('jack-s1').classList.remove('selected');
                document.getElementById('jack-s1').classList.add('wired');
                markSolved(idx, "Switchboard Patch Active!");
            }
        }

        /* NODE 12 COMBINATION LOCK */
        let dialNumber = 0; let currentDialRotation = 0;
        function openSafeDialModal(ready) {
            if (!ready) { alert("ACCESS DENIED: Solve all 11 preceding character nodes to unlock Andy's Vault."); return; }

            const modal = document.getElementById("card-modal");
            const modalBody = document.getElementById("modal-body");

            modalBody.innerHTML = `
                <div style="color: var(--alert-red); font-size: 0.75rem; text-align:center;">// COMBINATION LOCK ENCLAVE</div>
                <h2 style="color: #fff; margin-bottom: 8px; text-align:center;">ANDY'S SAFE DIAL</h2>
                <div style="font-size:0.75rem; color:var(--text-muted); text-align:center;">Click dial to align code: <strong style="color:var(--terminal-green)">70</strong></div>
                
                <div class="safe-container">
                    <div class="dial-marker"></div>
                    <div class="safe-dial" id="safeDial" onclick="rotateDial()"></div>
                </div>

                <div class="safe-number-display" id="dialVal" style="text-align:center;">00</div>
                <button class="modal-btn" onclick="unlockAndyVaultWithEvent()">DISENGAGE SAFE LOCK</button>
            `;
            modal.style.display = "flex";
        }

        function rotateDial() {
            currentDialRotation += 36;
            dialNumber = (dialNumber + 10) % 100;
            document.getElementById("safeDial").style.transform = `rotate(${currentDialRotation}deg)`;
            document.getElementById("dialVal").innerText = dialNumber < 10 ? `0${dialNumber}` : dialNumber;
        }

        /* BOUNCING ANDY PHYSICS ENGINE */
        let animationFrameId = null;

        function startBouncingAndy(durationMs, onComplete) {
            const andy = document.getElementById("andy-flying-icon");
            andy.style.display = "block";

            let x = window.innerWidth / 2 - 80;
            let y = window.innerHeight / 2 - 80;
            let dx = 8 + Math.random() * 4;
            let dy = 6 + Math.random() * 4;
            let rotation = 0;

            const iconSize = 160;
            const startTime = Date.now();

            function frame() {
                const elapsed = Date.now() - startTime;
                if (elapsed >= durationMs) {
                    andy.style.display = "none";
                    cancelAnimationFrame(animationFrameId);
                    if (onComplete) onComplete();
                    return;
                }

                x += dx; y += dy; rotation += 6;

                if (x <= 0 || x + iconSize >= window.innerWidth) { dx *= -1; triggerWallEffect(x, y); }
                if (y <= 0 || y + iconSize >= window.innerHeight) { dy *= -1; triggerWallEffect(x, y); }

                x = Math.max(0, Math.min(window.innerWidth - iconSize, x));
                y = Math.max(0, Math.min(window.innerHeight - iconSize, y));

                andy.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;

                if (Math.random() < 0.25) createGlitchTrail(x, y, rotation);

                animationFrameId = requestAnimationFrame(frame);
            }

            animationFrameId = requestAnimationFrame(frame);
        }

        function triggerWallEffect(x, y) {
            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 25, spread: 60,
                    origin: { x: (x + 80) / window.innerWidth, y: (y + 80) / window.innerHeight }
                });
            }
        }

        function createGlitchTrail(x, y, rotation) {
            const trail = document.createElement("img");
            trail.src = "lock.png";
            trail.className = "andy-trail";
            trail.onerror = function() { this.src = 'lock.jpg'; };
            trail.style.left = `${x}px`;
            trail.style.top = `${y}px`;
            trail.style.transform = `rotate(${rotation}deg)`;
            document.body.appendChild(trail);

            setTimeout(() => {
                trail.style.opacity = "0";
                setTimeout(() => trail.remove(), 400);
            }, 100);
        }

        function unlockAndyVaultWithEvent() {
            if (dialNumber !== 70) { alert("LOCK ENGAGED: Turn dial to 70."); return; }

            closeModal();
            document.body.classList.add("alarm-active");

            if (typeof confetti === 'function') confetti({ particleCount: 150, spread: 90, origin: { y: 0.5 } });

            startBouncingAndy(5500, () => {
                document.body.classList.remove("alarm-active");

                const modal = document.getElementById("card-modal");
                const modalBody = document.getElementById("modal-body");

                modalBody.innerHTML = `
                    <div style="color: var(--terminal-green); font-size: 0.75rem;">🎉 MASTER OVERRIDE COMPLETE</div>
                    <h2 style="color: #fff; margin-bottom: 8px;">ANDY'S VAULT UNLOCKED!</h2>
                    <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--terminal-green); padding: 14px; border-radius: 6px; margin: 12px 0;">
                        <div style="font-size: 0.85rem; color: #fff; margin-bottom:10px;">
                            <strong>CONGRATULATIONS AGENT!</strong> You cleared all 11 character nodes and disengaged Andy's vault dial lock!
                        </div>
                        <div style="font-size: 0.75rem; color: var(--amber-warn);">
                            ⚡ <strong>SEASON 2 TRADING CARD EXPANSION IS IN DEVELOPMENT!</strong><br>
                            A brand new set of cyberpunk trading cards, boss fights, and live liquidity pools are being deployed.
                        </div>
                    </div>
                    <button class="modal-btn" onclick="closeModal()">RETURN TO MATRIX</button>
                `;
                modal.style.display = "flex";
            });
        }

        function markSolved(index, message) {
            cardsData[index].solved = true;
            closeModal();
            renderGrid();
            alert(`🔓 ACCESS GRANTED: ${message}`);
        }

        renderGrid();
    </script>
</body>
