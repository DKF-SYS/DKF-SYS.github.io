<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKF INDUSTRIES // LIVE VAULT MATRIX</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #030712;
            --terminal-green: #10b981;
            --alert-red: #ef4444;
            --amber-warn: #f59e0b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;

            --glow-snpx: #10b981;
            --glow-chll: #10b981;
            --glow-glum: #a855f7;
            --glow-bite: #f97316;
            --glow-pdgy: #38bdf8;
            --glow-scrh: #ec4899;
            --glow-gwat: #10b981;
            --glow-zro:  #3b82f6;
            --glow-crkt: #eab308;
            --glow-slk:  #d946ef;
            --glow-ghst: #e2e8f0;
            --glow-lock: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 40%, rgba(16, 185, 129, 0.08), transparent 70%),
                linear-gradient(to bottom, rgba(3, 7, 18, 0.85), rgba(3, 7, 18, 0.98));
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* CRT Monitor Overlays */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: -40%; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to bottom, rgba(16, 185, 129, 0) 0%, rgba(16, 185, 129, 0.12) 50%, rgba(16, 185, 129, 0) 100%);
            z-index: 1000;
            pointer-events: none;
            animation: rollingSweep 8s linear infinite;
        }

        @keyframes rollingSweep {
            0% { top: -40%; }
            100% { top: 120%; }
        }

        .vault-header {
            background: rgba(11, 18, 27, 0.9);
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 12px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--terminal-green);
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .status-pill {
            background: #7f1d1d;
            color: #fca5a5;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--alert-red);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            width: 160px;
            height: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, #059669, #10b981);
            box-shadow: 0 0 8px #10b981;
        }

        .treasury-stat {
            font-size: 0.9rem;
            font-weight: bold;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-item {
            background-color: #0b0f19;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card-item:hover {
            transform: translateY(-6px);
        }

        .card-snpx { border: 2px solid var(--glow-snpx); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .card-chll { border: 2px solid var(--glow-chll); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .card-glum { border: 2px solid var(--glow-glum); box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
        .card-bite { border: 2px solid var(--glow-bite); box-shadow: 0 0 15px rgba(249, 115, 22, 0.4); }
        .card-pdgy { border: 2px solid var(--glow-pdgy); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .card-scrh { border: 2px solid var(--glow-scrh); box-shadow: 0 0 15px rgba(236, 72, 153, 0.4); }
        .card-gwat { border: 2px solid var(--glow-gwat); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .card-zro  { border: 2px solid var(--glow-zro);  box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .card-crkt { border: 2px solid var(--glow-crkt); box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
        .card-slk  { border: 2px solid var(--glow-slk);  box-shadow: 0 0 15px rgba(217, 70, 239, 0.4); }
        .card-ghst { border: 2px solid var(--glow-ghst); box-shadow: 0 0 15px rgba(226, 232, 240, 0.4); }
        .card-lock { border: 2px solid var(--glow-lock); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); background: #180909; }

        .card-inner {
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }

        .card-number-badge {
            position: absolute;
            top: 12px; left: 12px;
            width: 22px; height: 22px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #fff;
            z-index: 5;
        }

        .image-frame {
            width: 100%;
            height: 195px;
            background-color: #030712;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .status-badge-front {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .badge-locked-front {
            background: rgba(239, 68, 68, 0.15);
            color: var(--alert-red);
            border: 1px solid var(--alert-red);
        }

        .badge-cleared-front {
            background: rgba(16, 185, 129, 0.15);
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
        }

        .card-progress-bar-bg {
            width: 100%;
            height: 6px;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .card-progress-bar-fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .addr-box {
            background: rgba(3, 7, 18, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        .ticker-pill {
            align-self: center;
            background: #000000;
            padding: 3px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: auto;
        }

        .mini-chart-box {
            height: 32px;
            width: 100%;
            margin-bottom: 4px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #0b111e;
            border: 2px solid var(--terminal-green);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            padding: 24px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 12px; right: 16px;
            background: transparent;
            border: none;
            color: var(--alert-red);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .modal-input {
            width: 100%;
            background: #030712;
            border: 1px solid #334155;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .modal-btn {
            background: rgba(16, 185, 129, 0.15);
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
            padding: 10px 16px;
            border-radius: 4px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .modal-btn:hover {
            background: var(--terminal-green);
            color: #000;
        }

        @keyframes alarmFlash {
            0% { background-color: rgba(239, 68, 68, 0.3); }
            50% { background-color: rgba(0, 0, 0, 0.95); }
            100% { background-color: rgba(239, 68, 68, 0.3); }
        }

        .alarm-active {
            animation: alarmFlash 0.5s infinite !important;
        }
    </style>
</head>
<body>

    <div class="vault-header">
        <div class="header-title">
            <span>LIVE VAULT: SUB-WALLET #01</span>
            <span class="status-pill">LOCKED</span>
        </div>
        <div class="progress-container">
            <span>Hint Progress: 35%</span>
            <div class="progress-bar-bg">
                <div class="progress-fill"></div>
            </div>
            <span>Burn Goal: 75%</span>
        </div>
        <div class="treasury-stat">
            TREASURY: 14.2 SOL
        </div>
    </div>

    <div class="card-grid" id="card-grid"></div>

    <div class="modal-overlay" id="card-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const cardsData = [
            { id: 1, name: "MR. SNAPS", ticker: "$SNPX", baseName: "snpx", class: "card-snpx", color: "#10b981", addr: "3kF9xA1...9b2Z", progress: 45, chart: [12, 18, 25, 22, 45], solved: false, puzzle: "Observe the button flash sequence and enter the correct order (e.g. 1-3-2):", solution: "132" },
            { id: 2, name: "CHILL-BOT 9000", ticker: "$CHLL", baseName: "chill", class: "card-chll", color: "#10b981", addr: "7mP2qC8...4v1L", progress: 60, chart: [30, 35, 40, 52, 60], solved: false, puzzle: "Unscramble the letters on the oil can [O-R-B-T-O-S]:", solution: "ROBOTS" },
            { id: 3, name: "GLOOMIE", ticker: "$GLUM", baseName: "glum", class: "card-glum", color: "#a855f7", addr: "9xT4vN1...1m8K", progress: 30, chart: [10, 15, 12, 28, 30], solved: false, puzzle: "Match the floating shadow silhouette letter code hidden in the glass tube:", solution: "GLUM" },
            { id: 4, name: "OVER-BITE", ticker: "$BITE", baseName: "bite", class: "card-bite", color: "#f97316", addr: "2bL8rY9...6p3W", progress: 80, chart: [40, 50, 65, 70, 80], solved: false, puzzle: "Trace the arcade screen maze path word:", solution: "ARCADE" },
            { id: 5, name: "PUDGY BYTES", ticker: "$PDGY", baseName: "pdgy", class: "card-pdgy", color: "#38bdf8", addr: "5vZ1mQ4...8t7X", progress: 20, chart: [5, 12, 10, 15, 20], solved: false, puzzle: "Complete the 5x5 nonogram grid word code:", solution: "PENGUIN" },
            { id: 6, name: "SCREECH", ticker: "$SCRH", baseName: "scrh", class: "card-scrh", color: "#ec4899", addr: "8kN3pL2...5x9Y", progress: 90, chart: [50, 60, 75, 82, 90], solved: false, puzzle: "Translate the Morse audio frequency flashes:", solution: "WIRE" },
            { id: 7, name: "GIGA-WATT", ticker: "$GWAT", baseName: "gwat", class: "card-gwat", color: "#10b981", addr: "1qW4eR7...3y2U", progress: 50, chart: [20, 30, 25, 40, 50], solved: false, puzzle: "Enter the correct switch sequence to balance the high-voltage grid (e.g. ON-OFF-ON):", solution: "ON-OFF-ON" },
            { id: 8, name: "ZERO", ticker: "$ZRO", baseName: "zro", class: "card-zro", color: "#3b82f6", addr: "4uI9oP1...7a6S", progress: 15, chart: [5, 8, 10, 12, 15], solved: false, puzzle: "Apply the backward 2-step Caesar shift to the string [EDX]:", solution: "CBV" },
            { id: 9, name: "PROFESSOR CIRCUIT", ticker: "$CRKT", baseName: "crkt", class: "card-crkt", color: "#eab308", addr: "6dF3gH8...2j1K", progress: 70, chart: [30, 45, 50, 62, 70], solved: false, puzzle: "Calculate the gear ratio rotation output (e.g. 2CCW):", solution: "2CCW" },
            { id: 10, name: "SLICK", ticker: "$SLK", baseName: "slk", class: "card-slk", color: "#d946ef", addr: "9zC5vB0...4m3N", progress: 40, chart: [15, 20, 32, 38, 40], solved: false, puzzle: "Solve the neon sign rebus puzzle [EYE + KEY - BEE + RAIN]:", solution: "CYBER" },
            { id: 11, name: "THE DEVELOPER'S GHOST", ticker: "$GHST", baseName: "ghst", class: "card-ghst", color: "#e2e8f0", addr: "3xS7dF2...8g9H", progress: 10, chart: [2, 4, 6, 8, 10], solved: false, puzzle: "Assemble the final master synthesis passcode from the previous 10 nodes:", solution: "MASTERKEY" },
            { id: 12, name: "ANDY'S VAULT", ticker: "NODE-12", class: "card-lock", color: "#ef4444", addr: "ENCRYPTED", progress: 0, chart: [], solved: false, isVault: true }
        ];

        const gridContainer = document.getElementById("card-grid");
        const chartInstances = {};

        function handleImageError(imgElement, baseName) {
            if (imgElement.dataset.triedPng) {
                imgElement.style.display = 'none';
                imgElement.nextElementSibling.style.display = 'flex';
                return;
            }
            imgElement.dataset.triedPng = "true";
            imgElement.src = baseName + ".png";
        }

        function renderGrid() {
            gridContainer.innerHTML = "";
            let solvedCount = cardsData.filter(c => c.solved).length;

            cardsData.forEach((card, index) => {
                const cardEl = document.createElement("div");

                if (card.isVault) {
                    cardEl.className = `card-item ${card.class}`;
                    const readyToActivate = solvedCount === 11;
                    cardEl.innerHTML = `
                        <div class="card-number-badge" style="color: var(--alert-red); border-color: var(--alert-red);">12</div>
                        <div class="card-inner">
                            <div class="image-frame" style="border-color: var(--alert-red);">
                                <div style="text-align: center; color: var(--alert-red);">
                                    <div style="font-size: 2.2rem;">🔒</div>
                                    <div style="font-size: 0.65rem; margin-top: 4px;">ANDY'S VAULT</div>
                                </div>
                            </div>
                            <div class="card-title" style="color: var(--alert-red);">${card.name}</div>
                            <div class="status-badge-front badge-locked-front">
                                ${readyToActivate ? 'READY TO UNLOCK' : '🔒 ENCRYPTED'}
                            </div>
                            <div class="addr-box" style="border-color: var(--alert-red); color: var(--alert-red);">ACCESS RESTRICTED</div>
                            <div class="ticker-pill" style="color: var(--alert-red); border-color: var(--alert-red);">[LOCKED]</div>
                        </div>
                    `;
                    cardEl.onclick = () => triggerNode12Sequence(readyToActivate);
                } else {
                    cardEl.className = `card-item ${card.class}`;
                    let statusBadgeHTML = card.solved
                        ? `<div class="status-badge-front badge-cleared-front">✓ UNLOCKED (100%)</div>`
                        : `<div class="status-badge-front badge-locked-front">🔒 LOCKED (${card.progress}%)</div>`;

                    cardEl.innerHTML = `
                        <div class="card-number-badge">${card.id}</div>
                        <div class="card-inner">
                            <div class="image-frame">
                                <img src="${card.baseName}.jpg" alt="${card.name}" onerror="handleImageError(this, '${card.baseName}')">
                                <div style="display:none; flex-direction:column; align-items:center; color: var(--text-muted); font-size: 0.7rem;">
                                    <div style="font-size: 1.5rem;">🖼️</div>
                                    <div>${card.baseName}.jpg/png</div>
                                </div>
                            </div>
                            <div class="card-title">${card.name}</div>
                            ${statusBadgeHTML}
                            <div class="card-progress-bar-bg">
                                <div class="card-progress-bar-fill" style="width: ${card.solved ? 100 : card.progress}%; background: ${card.color}; box-shadow: 0 0 6px ${card.color};"></div>
                            </div>
                            <div class="addr-box">CA: ${card.addr}</div>
                            <div class="mini-chart-box">
                                <canvas id="mini-chart-${card.id}"></canvas>
                            </div>
                            <div class="ticker-pill" style="color: ${card.color}; border-color: ${card.color};">${card.ticker}</div>
                        </div>
                    `;

                    cardEl.onclick = () => openModal(card, index);
                }

                gridContainer.appendChild(cardEl);

                if (!card.isVault) {
                    setTimeout(() => renderMiniChart(card), 50);
                }
            });
        }

        function renderMiniChart(card) {
            const ctx = document.getElementById(`mini-chart-${card.id}`);
            if (!ctx) return;
            if (chartInstances[card.id]) chartInstances[card.id].destroy();

            chartInstances[card.id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1', '2', '3', '4', '5'],
                    datasets: [{
                        data: card.chart,
                        borderColor: card.color,
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        function openModal(card, index) {
            const modal = document.getElementById("card-modal");
            const modalBody = document.getElementById("modal-body");
            
            if (card.solved) {
                modalBody.innerHTML = `
                    <div style="color: ${card.color}; font-size: 0.75rem; margin-bottom: 4px;">// ACCESS STATUS: UNLOCKED / CLEARED</div>
                    <h2 style="color: #fff; margin-bottom: 8px;">${card.name} (${card.ticker})</h2>
                    <div style="background: #030712; border: 1px solid ${card.color}; padding: 10px; border-radius: 4px; margin-bottom: 12px;">
                        <div style="font-size: 0.7rem; color: var(--text-muted);">CONTRACT ADDRESS</div>
                        <div style="font-size: 0.8rem; color: ${card.color}; word-break: break-all;">${card.addr}</div>
                    </div>
                    <div style="color: var(--terminal-green); text-align: center; font-weight: bold; padding: 15px;">✓ NODE ALREADY SOLVED & CLEARANCE SECURED</div>
                `;
            } else {
                modalBody.innerHTML = `
                    <div style="color: ${card.color}; font-size: 0.75rem; margin-bottom: 4px;">// SCAVENGER HUNT CHALLENGE (STAGE ${card.id})</div>
                    <h2 style="color: #fff; margin-bottom: 8px;">${card.name} (${card.ticker})</h2>
                    
                    <div style="background: #030712; border: 1px solid ${card.color}; padding: 12px; border-radius: 4px; margin-bottom: 12px;">
                        <div style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px;">PUZZLE CLUE:</div>
                        <div style="font-size: 0.85rem; color: #fff; line-height: 1.4;">${card.puzzle}</div>
                    </div>

                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px;">ENTER SOLUTION CODE:</div>
                    <input type="text" id="puzzle-answer" class="modal-input" placeholder="Type solution here..." />

                    <button class="modal-btn" style="border-color: ${card.color}; color: ${card.color};" onclick="submitPuzzle(${index})">
                        VERIFY & UNLOCK NODE
                    </button>
                `;
            }
            
            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById("card-modal").style.display = "none";
        }

        function submitPuzzle(index) {
            const inputVal = document.getElementById("puzzle-answer").value.trim().toUpperCase();
            const correctVal = cardsData[index].solution.toUpperCase();

            if (inputVal === correctVal) {
                cardsData[index].solved = true;
                cardsData[index].progress = 100;
                closeModal();
                renderGrid();
                alert("ACCESS GRANTED: Puzzle solved successfully!");
            } else {
                alert("ACCESS DENIED: Incorrect solution code. Try again!");
            }
        }

        function triggerNode12Sequence(ready) {
            if (!ready) {
                alert("ACCESS DENIED: You must solve all 11 preceding character nodes before activating Node 12 (Andy's Vault).");
                return;
            }

            document.body.classList.add("alarm-active");
            alert("⚠️ WARNING: CRITICAL OVERRIDE INITIATED! UNLOCKING ANDY'S VAULT...");
            
            setTimeout(() => {
                document.body.classList.remove("alarm-active");
                alert("🔓 SUCCESS: LEVEL-5 ENCLAVE UNLOCKED. WELCOME TO ANDY'S PRIVATE VAULT.");
            }, 3000);
        }

        renderGrid();
    </script>
</body>
</html>
