<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKF INDUSTRIES // ABANDONED BUNKER TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #020509;
            --terminal-green: #10b981;
            --terminal-dim: #064e3b;
            --alert-red: #ef4444;
            --amber-warn: #f59e0b;
            --card-bg: #090d16;
            --text-main: #d1d5db;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Abandoned Bunker CRT Scanline & Grid Effect Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
            opacity: 0.7;
        }

        /* CRT Screen Flicker */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(16, 185, 129, 0.02);
            opacity: 0;
            z-index: 1001;
            pointer-events: none;
            animation: crtFlicker 0.15s infinite;
        }

        @keyframes crtFlicker {
            0% { opacity: 0.01; }
            50% { opacity: 0.04; }
            100% { opacity: 0.01; }
        }

        /* Header Vault Status */
        .vault-header {
            background: rgba(11, 18, 27, 0.9);
            border: 2px solid var(--terminal-green);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 1.3rem;
            color: var(--terminal-green);
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }

        .clearance-tracker {
            font-size: 0.85rem;
            color: var(--amber-warn);
            border: 1px solid var(--amber-warn);
            padding: 6px 12px;
            border-radius: 4px;
            background: rgba(245, 158, 11, 0.1);
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Card Container */
        .card-item {
            background-color: var(--card-bg);
            border: 2px solid #1f2937;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card-item.unlocked:hover {
            border-color: var(--terminal-green);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
            transform: translateY(-3px);
        }

        .card-item.locked-node {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #374151;
            background-color: #05070c;
        }

        /* Node 12 Special Locked Card Style */
        .card-item.vault-node-12 {
            border-color: var(--alert-red);
            background: rgba(239, 68, 68, 0.05);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .card-status-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
            align-self: flex-start;
            margin-bottom: 8px;
        }

        .badge-unlocked { background: var(--terminal-dim); color: var(--terminal-green); border: 1px solid var(--terminal-green); }
        .badge-solved { background: #065f46; color: #34d399; border: 1px solid #10b981; }
        .badge-locked { background: #374151; color: var(--text-muted); border: 1px solid #4b5563; }
        .badge-alert { background: #7f1d1d; color: var(--alert-red); border: 1px solid var(--alert-red); }

        .image-frame {
            width: 100%;
            height: 180px;
            background-color: #000;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #1f2937;
            position: relative;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .card-ticker {
            font-size: 0.75rem;
            color: var(--terminal-green);
            margin-bottom: 8px;
        }

        /* Coin Address Box */
        .addr-box {
            background: #02050a;
            border: 1px solid #1f2937;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Progress Bar */
        .card-progress-bg {
            width: 100%;
            height: 6px;
            background: #111827;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
            border: 1px solid #1f2937;
        }

        .card-progress-fill {
            height: 100%;
            background: var(--terminal-green);
            width: 0%;
        }

        /* Small Chart Box */
        .mini-chart-box {
            height: 45px;
            width: 100%;
        }

        /* Full View Modal Overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #0b111e;
            border: 2px solid var(--terminal-green);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            border-radius: 8px;
            max-width: 500px;
            width: 100%;
            padding: 24px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 12px; right: 16px;
            background: transparent;
            border: none;
            color: var(--alert-red);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .modal-btn {
            background: var(--terminal-dim);
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
            padding: 10px 16px;
            border-radius: 4px;
            width: 100%;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .modal-btn:hover {
            background: var(--terminal-green);
            color: #000;
        }

        /* Alarm Flash Animation for Node 12 Sequence */
        @keyframes alarmFlash {
            0% { background-color: rgba(239, 68, 68, 0.3); }
            50% { background-color: rgba(0, 0, 0, 0.9); }
            100% { background-color: rgba(239, 68, 68, 0.3); }
        }

        .alarm-active {
            animation: alarmFlash 0.5s infinite !important;
        }
    </style>
</head>
<body>

    <!-- Header Banner -->
    <div class="vault-header">
        <div class="header-title">
            <h1>DKF INDUSTRIES // BUNKER MONITOR</h1>
            <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 2px;">SECURE CLEARANCE SUB-LEVEL 04</div>
        </div>
        <div class="clearance-tracker" id="clearance-status">
            CLEARANCE PROGRESS: 0 / 11 CARDS SOLVED
        </div>
    </div>

    <!-- 12 Node Grid -->
    <div class="card-grid" id="card-grid"></div>

    <!-- Stats & Solve Modal -->
    <div class="modal-overlay" id="card-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const cardsData = [
            { id: 1, name: "MR. SNAPS", ticker: "$SNPX", desc: "Mechanical Capture & Hardware Interlocking Unit.", addr: "3kF9xA1...9b2Z", progress: 45, chart: [12, 18, 25, 22, 45], solved: false, img: "snpx.jpg" },
            { id: 2, name: "MELLOW-TRON", ticker: "$MLOW", desc: "Signal Stabilization & Frequency Dampening.", addr: "7mP2qC8...4v1L", progress: 60, chart: [30, 35, 40, 52, 60], solved: false, img: "mlow.jpg" },
            { id: 3, name: "GLOOMIE", ticker: "$GLUM", desc: "Sub-Layer Telemetry & Low-Voltage Monitoring.", addr: "9xT4vN1...1m8K", progress: 30, chart: [10, 15, 12, 28, 30], solved: false, img: "glum.jpg" },
            { id: 4, name: "OVER-BITE", ticker: "$BITE", desc: "Data Ingestion & Mechanical Compression.", addr: "2bL8rY9...6p3W", progress: 80, chart: [40, 50, 65, 70, 80], solved: false, img: "bite.jpg" },
            { id: 5, name: "PUDGY BYTES", ticker: "$PDGY", desc: "Buffer Storage & Heavy Data Processing.", addr: "5vZ1mQ4...8t7X", progress: 20, chart: [5, 12, 10, 15, 20], solved: false, img: "pdgy.jpg" },
            { id: 6, name: "SCREECH", ticker: "$SCRH", desc: "High-Frequency Comms & Acoustic Waveform.", addr: "8kN3pL2...5x9Y", progress: 90, chart: [50, 60, 75, 82, 90], solved: false, img: "scrh.jpg" },
            { id: 7, name: "GIGA-WATT", ticker: "$GWAT", desc: "Primary Power Grid & High-Voltage Discharge.", addr: "1qW4eR7...3y2U", progress: 50, chart: [20, 30, 25, 40, 50], solved: false, img: "gwat.jpg" },
            { id: 8, name: "ZERO", ticker: "$ZRO", desc: "System Reset & Null-State Enclave.", addr: "4uI9oP1...7a6S", progress: 15, chart: [5, 8, 10, 12, 15], solved: false, img: "zro.jpg" },
            { id: 9, name: "PROFESSOR CIRCUIT", ticker: "$CRKT", desc: "Main Architecture Logic & CPU Routing.", addr: "6dF3gH8...2j1K", progress: 70, chart: [30, 45, 50, 62, 70], solved: false, img: "crkt.jpg" },
            { id: 10, name: "SLICK", ticker: "$SLK", desc: "Frictionless Protocol & Exchange Routing.", addr: "9zC5vB0...4m3N", progress: 40, chart: [15, 20, 32, 38, 40], solved: false, img: "slk.jpg" },
            { id: 11, name: "THE DEVELOPER'S GHOST", ticker: "$GHST", desc: "Autonomous Legacy Kernel & Background Scripting.", addr: "3xS7dF2...8g9H", progress: 10, chart: [2, 4, 6, 8, 10], solved: false, img: "ghst.jpg" },
            { id: 12, name: "ANDY'S VAULT", ticker: "NODE-12", desc: "Level-5 Untouchable Enclave.", addr: "ENCRYPTED", progress: 0, chart: [], solved: false, isVault: true }
        ];

        let activeUnlockedIndex = 0; // Card 1 unlocked by default
        const gridContainer = document.getElementById("card-grid");
        const chartInstances = {};

        function renderGrid() {
            gridContainer.innerHTML = "";
            let solvedCount = cardsData.filter(c => c.solved).length;
            document.getElementById("clearance-status").innerText = `CLEARANCE PROGRESS: ${solvedCount} / 11 CARDS SOLVED`;

            cardsData.forEach((card, index) => {
                const cardEl = document.createElement("div");
                const isUnlocked = index <= activeUnlockedIndex;
                
                if (card.isVault) {
                    // Node 12 special state
                    cardEl.className = "card-item vault-node-12";
                    const readyToActivate = solvedCount === 11;
                    cardEl.innerHTML = `
                        <span class="card-status-badge ${readyToActivate ? 'badge-alert' : 'badge-locked'}">
                            ${readyToActivate ? 'READY TO UNLOCK' : 'LOCKED'}
                        </span>
                        <div class="image-frame" style="border-color: var(--alert-red);">
                            <div style="text-align: center; color: var(--alert-red);">
                                <div style="font-size: 2rem;">🔒</div>
                                <div style="font-size: 0.7rem; margin-top: 4px;">ANDY'S VAULT</div>
                            </div>
                        </div>
                        <div class="card-title" style="color: var(--alert-red);">${card.name}</div>
                        <div style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px;">LOCKED // UNLOCK CARDS TO ACTIVATE</div>
                        <div class="addr-box" style="border-color: var(--alert-red); color: var(--alert-red);">ACCESS RESTRICTED</div>
                    `;
                    cardEl.onclick = () => triggerNode12Sequence(readyToActivate);
                } else {
                    cardEl.className = `card-item ${isUnlocked ? 'unlocked' : 'locked-node'}`;
                    let statusBadge = `<span class="card-status-badge badge-locked">LOCKED</span>`;
                    if (card.solved) {
                        statusBadge = `<span class="card-status-badge badge-solved">✓ SOLVED</span>`;
                    } else if (isUnlocked) {
                        statusBadge = `<span class="card-status-badge badge-unlocked">ACTIVE NODE</span>`;
                    }

                    cardEl.innerHTML = `
                        ${statusBadge}
                        <div class="image-frame">
                            <img src="${card.img}" alt="${card.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <div style="display:none; color: var(--text-muted); font-size: 0.7rem;">🖼️ ${card.img}</div>
                        </div>
                        <div class="card-title">${card.name}</div>
                        <div class="card-ticker">${card.ticker}</div>
                        <div class="addr-box">CA: ${card.addr}</div>
                        <div style="font-size: 0.65rem; color: var(--text-muted); margin-bottom: 2px;">CLEARANCE: ${card.progress}%</div>
                        <div class="card-progress-bg">
                            <div class="card-progress-fill" style="width: ${card.progress}%;"></div>
                        </div>
                        <div class="mini-chart-box">
                            <canvas id="mini-chart-${card.id}"></canvas>
                        </div>
                    `;

                    if (isUnlocked) {
                        cardEl.onclick = () => openModal(card, index);
                    }
                }

                gridContainer.appendChild(cardEl);

                // Render mini sparklines for active cards
                if (isUnlocked && !card.isVault) {
                    setTimeout(() => renderMiniChart(card), 50);
                }
            });
        }

        function renderMiniChart(card) {
            const ctx = document.getElementById(`mini-chart-${card.id}`);
            if (!ctx) return;
            if (chartInstances[card.id]) chartInstances[card.id].destroy();

            chartInstances[card.id] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['1', '2', '3', '4', '5'],
                    datasets: [{
                        data: card.chart,
                        borderColor: '#10b981',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        function openModal(card, index) {
            const modal = document.getElementById("card-modal");
            const modalBody = document.getElementById("modal-body");
            
            modalBody.innerHTML = `
                <div style="color: var(--terminal-green); font-size: 0.75rem; margin-bottom: 4px;">// TACTICAL NODE SPECS</div>
                <h2 style="color: #fff; margin-bottom: 4px;">${card.name} (${card.ticker})</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px;">${card.desc}</p>
                
                <div style="background: #030712; border: 1px solid #1f2937; padding: 10px; border-radius: 4px; margin-bottom: 12px;">
                    <div style="font-size: 0.7rem; color: var(--text-muted);">CONTRACT ADDRESS</div>
                    <div style="font-size: 0.8rem; color: var(--terminal-green); word-break: break-all;">${card.addr}</div>
                </div>

                <div style="margin-bottom: 12px;">
                    <div style="font-size: 0.75rem; margin-bottom: 4px;">CLEARANCE TELEMETRY: ${card.progress}%</div>
                    <div class="card-progress-bg" style="height: 10px;">
                        <div class="card-progress-fill" style="width: ${card.progress}%;"></div>
                    </div>
                </div>

                <button class="modal-btn" onclick="solveCard(${index})">
                    ${card.solved ? 'NODE ALREADY SOLVED' : 'COMPLETE NODE TASK & UNLOCK NEXT'}
                </button>
            `;
            
            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById("card-modal").style.display = "none";
        }

        function solveCard(index) {
            cardsData[index].solved = true;
            cardsData[index].progress = 100;
            if (activeUnlockedIndex === index && activeUnlockedIndex < 11) {
                activeUnlockedIndex++;
            }
            closeModal();
            renderGrid();
        }

        function triggerNode12Sequence(ready) {
            if (!ready) {
                alert("ACCESS DENIED: You must solve all 11 preceding character nodes before activating Node 12 (Andy's Vault).");
                return;
            }

            // Launch Node 12 Emergency Override Action Sequence
            document.body.classList.add("alarm-active");
            alert("⚠️ WARNING: CRITICAL OVERRIDE INITIATED! UNLOCKING ANDY'S VAULT...");
            
            setTimeout(() => {
                document.body.classList.remove("alarm-active");
                alert("🔓 SUCCESS: LEVEL-5 ENCLAVE UNLOCKED. WELCOME TO ANDY'S PRIVATE VAULT.");
            }, 3000);
        }

        // Initial launch
        renderGrid();
    </script>
</body>
</html>
